services:
  - type: web             # Web Service — health-check server keeps the port open
    name: system-telegram
    runtime: node
    buildCommand: npm install
    startCommand: node src/bot.js
    envVars:
      - key: BOT_TOKEN
        sync: false       # Set this manually in the Render dashboard (secret)
      - key: BACKEND_URL
        value: https://system-backend-jbnd.onrender.com
